<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="url(#accent)" stroke-width="3"/>

  <!-- Hathor "h" symbol - stylized -->
  <!-- Vertical stroke of h -->
  <rect x="38" y="24" width="7" height="58" rx="3.5" fill="#4c1d95"/>
  <!-- Crossbar at top (the Saturn-like bar) -->
  <rect x="30" y="30" width="23" height="5" rx="2.5" fill="#4c1d95"/>
  <!-- Curve of h going right -->
  <path d="M41.5 58 Q41.5 48, 55 48 Q68 48, 68 58 L68 82"
        stroke="#4c1d95" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- QA Magnifying glass overlaid on bottom-right -->
  <g transform="translate(72, 72)">
    <!-- Glass circle -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#8b5cf6" stroke-width="4"/>
    <circle cx="0" cy="0" r="16" fill="rgba(139,92,246,0.1)"/>
    <!-- Handle -->
    <line x1="11" y1="11" x2="24" y2="24" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round"/>
    <!-- Checkmark inside magnifying glass -->
    <polyline points="-7,1 -2,6 8,-5" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
